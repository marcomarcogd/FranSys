spring:
  application:
    name: FranSys
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:fransys}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: true
      static-locations: classpath:/static/,file:src/main/frontend/dist/

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    issuer: fransys
    secret: ${JWT_SECRET:FranSysJwtSecretFranSysJwtSecret2026}
    access-token-minutes: 720
  public-feedback:
    expire-days: 30
